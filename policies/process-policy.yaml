version: 1
positioning:
  model: notariat_as_code
  operating_principle: enterprise_gitops
  implementation_label: nac
baseline:
  generic_modules:
    - formation
    - invoice
    - bookkeeping
    - tax
  required_controls:
    - pull_request
    - review
    - traceability
    - periodic_close
    - role_based_permissions
    - qualification_gates
branch_modules:
  law_firm:
    enabled: false
    includes:
      - mandate_intake
      - conflict_check
      - deadline_control
  notary:
    enabled: true
    includes:
      - deed_preparation
      - identity_verification
      - execution_tracking
  tax_office:
    enabled: false
    includes:
      - client_onboarding
      - declaration_cycle
      - plausibility_checks
  software_company:
    enabled: true
    includes:
      - release_governance
      - incident_management
      - service_level_reporting
  wealth_management:
    enabled: true
    includes:
      - client_intake_and_kyc
      - portfolio_rebalancing_control
      - suitability_and_risk_profile_review
      - mandate_reporting_and_audit
  property_management:
    enabled: true
    includes:
      - tenant_intake_and_contract_setup
      - maintenance_ticket_and_vendor_dispatch
      - service_charge_and_budget_control
      - handover_and_damage_documentation
  carpentry:
    enabled: false
    includes:
      - customer_intake
      - quoting_and_measurement
      - workshop_and_installation
      - warranty_tracking
change_management:
  require_change_request: true
  require_impact_assessment: true
  require_version_bump: true
  require_commit_for_update_completion: true
  require_github_push_for_update_completion: true
  require_target_branch_merge_for_update_completion: false
  completion_target_branch: main
  completion_remote: github
  report_finished_only_after_target_branch_merge: false
  report_finished_only_after_target_branch_reaches_head: true
  finished_status_requires_clean_target_branch_workspace: true
  delivery_modes:
    protected_pr:
      target: production_forks_and_sensitive_process_changes
      require_branch: true
      require_pull_request: true
      require_review: true
      completion_requires_merge_to_target_branch: true
    owner_direct_main:
      target: active_reference_repo_when_owner_explicitly_requests_direct_delivery
      require_branch: false
      require_pull_request: false
      require_review: false
      completion_requires_push_to_target_branch: true
      completion_requires_strict_validation: true
      completion_requires_clean_workspace: true
  default_delivery_mode_for_production: protected_pr
  current_reference_repo_delivery_mode: owner_direct_main

rule_architecture:
  source_of_truth: policies/process-policy.yaml
  human_explanation_de: docs/de/regelarchitektur.md
  human_explanation_en: docs/en/regelarchitektur.md
  mirror_surfaces:
    - AGENTS.md
    - .github/copilot-instructions.md
    - .cursor/rules
    - docs/de/START_HERE.md
    - docs/en/START_HERE.md
  groups:
    completion_and_finished_state:
      hardness: hard
      enforced_by:
        - git status
        - git rev-parse HEAD
        - git rev-parse origin/main
        - nac doctor --profile strict
    git_delivery:
      hardness: mode_dependent
      production_default: protected_pr
      active_reference_repo_default: owner_direct_main
    roadmap_and_gantt:
      hardness: guidance_plus_render_gate
      enforced_by:
        - scripts/validate_gantt_progress.py
    language_and_localization:
      hardness: hard
      enforced_by:
        - scripts/validate_language_parity.py
    cli_and_operator_surface:
      hardness: hard_for_new_functionality
      enforced_by:
        - tests
        - nac doctor --profile strict
    data_protection_and_data_repo:
      hardness: hard
      enforced_by:
        - scripts/privacy_lint.py
        - policies/data-protection-policy.yaml
    plugins_skills_and_agent_method:
      hardness: mixed
      enforced_by:
        - scripts/validate_plugins.py
        - scripts/install_local_plugins.py --mode link
    validation_and_doctor:
      hardness: hard
      enforced_by:
        - scripts/quality_gate.py

agent_workflows:
  require_plan_before_code_when_scope_is_open: true
  require_user_confirmation_before_code_for_ambiguous_requests: true
  allow_direct_implementation_for_clear_small_changes: true
  require_tests_or_validation_evidence_for_code_changes: true
  prefer_test_checkpoint_before_non_trivial_implementation: true
  require_iteration_until_validation_passes: true
  require_visual_evidence_for_ui_changes: true
  require_clear_purpose_for_elevated_command_approval: true

portfolio_structure:
  plugin_root: plugins
  workflow_root: workflows
  usecase_root: usecases
  separation_required: true
  tracks:
    plugins:
      purpose: installable_marketplace_and_workspace_packages
      gantt: plugins/GANTT.md
    workflows:
      purpose: installable_skills_and_deterministic_python_workflows
      gantt: workflows/GANTT.md
    usecases:
      purpose: concrete_notarial_business_scenarios
      gantt: usecases/GANTT.md

progress_tracking:
  global_gantt: roadmap/GANTT.md
  require_global_gantt_update_for_every_push: false
  require_global_gantt_update_for_roadmap_scope_or_status_changes: true
  require_area_gantt_update_for_area_scope_or_status_changes: true
  no_gantt_required_for_small_fixes_without_roadmap_impact: true
  trigger_examples:
    global_gantt:
      - new_or_removed_product_area
      - milestone_or_delivery_date_change
      - roadmap_status_or_progress_change
      - active_build_board_change
    area_gantt:
      - new_or_removed_plugin_workflow_or_usecase
      - area_status_or_progress_change
      - pilot_readiness_or_milestone_change
    no_gantt_required:
      - typo_fix
      - local_documentation_clarification_without_scope_change
      - validator_or_test_fix_without_scope_change
      - ui_detail_fix_without_status_change
  enforced_by: scripts/validate_gantt_progress.py
  validator_scope:
    - required_gantt_files_exist
    - mermaid_gantt_render_safety
    - guidance_for_possible_roadmap_or_area_updates

knowledge_graph:
  location: usecase_local
  required_files_per_usecase:
    - knowledge-graph.graph.json
    - knowledge-graph.md
  prohibit_central_knowledge_graph_root: true
  values_must_stay_empty_in_git: true
  enforced_by: scripts/validate_knowledge_graph.py

plugin_execution:
  local_workspace: ~/NaC
  omnistation_execution_allowed: false
  local_plugin_mirror:
    marketplace: ~/.agents/plugins/marketplace.json
    plugin_root: ~/plugins
    install_command: python scripts/install_local_plugins.py --mode link
    restart_required: true
  require_plan_preview: true
  require_human_review_before_execution: true
  require_audit_evidence: true
  require_day2_drift_handling: true
  require_plugin_manifest_validation: true
  plan_documentation_roots:
    - docs/de/plugin-plans
    - docs/en/plugin-plans

release_sync:
  upstream_sync_only_via_pull_request: true
  default_sync_cycle: monthly_or_quarterly
  require_upstream_release_reference: true

parallel_operation:
  bind_case_to_version_on_start: true
  running_cases_keep_bound_version: true
  require_exception_approval_for_rebinding: true

issue_governance:
  single_leading_issue_per_topic: true
  require_cross_repo_issue_links: true

documentation_links:
  require_markdown_links_for_repo_references: true
  applies_to:
    - readme_files
    - start_here_documents
    - agent_rule_surfaces
  path_references_should_be_clickable: true
  allowed_code_spans:
    - commands
    - configuration_keys
    - file_patterns
    - code_identifiers
  enforced_by: scripts/validate_doc_links.py

operating_cadence:
  default_method: agile
  allowed_methods:
    - agile
    - kanban
  allowed_sprint_durations:
    - 1w
    - 2w
    - 4w
  allowed_daily_durations:
    - 5m
    - 10m
    - 20m
  allowed_kanban_review_cadences:
    - 1w
    - 2w
    - 4w
  allowed_kanban_sync_durations:
    - 5m
    - 10m
    - 20m

role_model:
  required_policy: policies/role-model-policy.yaml
  everyone_can_open_ticket: true

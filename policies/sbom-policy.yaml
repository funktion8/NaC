version: 1
status: mandatory

sbom:
  required: true
  minimum_formats:
    - cyclonedx_json
    - spdx_json
  export_directory: out/sbom/

generation_stack:
  cyclonedx:
    product: cyclonedx-python
    license_model: opensource
    subscription_required: false
  spdx:
    product: syft
    license_model: opensource
    subscription_required: false

platform_features:
  github_actions:
    required: true
    subscription_required: false
  github_dependency_graph:
    required: recommended
    subscription_required: false
  github_advanced_security:
    required: optional
    subscription_required: true
    notes:
      - "Bietet zusaetzliche Security-Funktionen, ist aber fuer SBOM-Erzeugung nicht zwingend."

governance:
  required_on_release: true
  required_on_pull_request: recommended

ai_sbom:
  status: emerging_mandatory
  applies_to:
    - ai_enabled_plugins
    - ai_enabled_workflows
    - ai_enabled_usecases
    - external_model_calls
    - agentic_or_prompt_driven_automation
  artifact_directory: sbom/ai/
  export_directory: out/sbom/ai/
  required_on_ai_release: true
  required_before_external_ai_processing: true
  source_references:
    - https://www.bsi.bund.de/DE/Service-Navi/Presse/Pressemitteilungen/Presse2026/260512_G7_Richtlinie_SBOM_for_AI.html
    - https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Kuenstliche-Intelligenz/KI.html
    - https://www.cisa.gov/resources-tools/resources/software-bill-materials-ai-minimum-elements
  minimum_element_clusters:
    - metadata
    - system_level_properties
    - models
    - datasets
    - infrastructure
    - security_properties
    - key_performance_indicators
  noc_extensions:
    - privacy_and_avv_dpa_status
    - notary_professional_secret_boundary
    - human_review_and_approval_owner
    - local_vs_external_processing_boundary
    - evidence_retention_and_release_binding
  prohibited_content:
    - real_personal_data
    - secrets_or_api_keys
    - private_keys_or_certificate_material
    - client_or_mandate_content
    - account_identifiers_not_needed_for_review
